<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --grad: linear-gradient(135deg, #f8ce57 0%, #f3ad3e 30%, #37bda9 100%);
      --ink: #1b1d21; --ink2: #565b64; --ink3: #8a909b;
      --card: #f1f2f4; --card-hover: #e9ebee; --line: #e7e9ec;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; width: 360px; height: 480px; font-family: var(--font); color: var(--ink); background: #fff; display: flex; flex-direction: column; }
    .header { display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: #202126; color: #fff; }
    .wordmark { font-weight: 700; font-size: 14px; }
    .gradient-text { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .grow { flex: 1; }
    .iconbtn { border: none; background: transparent; color: inherit; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; }
    .iconbtn:hover { background: rgba(255,255,255,0.12); }
    .searchbar { display: flex; align-items: center; gap: 8px; margin: 10px 12px 4px; padding: 9px 11px; background: var(--card); border-radius: 11px; }
    .searchbar svg { color: var(--ink3); }
    .searchbar input { flex: 1; border: none; background: transparent; outline: none; font-family: var(--font); font-size: 13px; color: var(--ink); }
    .crumbs { padding: 2px 14px; font-size: 12px; color: var(--ink3); }
    .crumbs b { color: var(--ink); }
    .content { flex: 1; overflow-y: auto; padding: 6px 12px 12px; display: flex; flex-direction: column; gap: 8px; }
    .row { display: flex; align-items: center; gap: 11px; padding: 11px 12px; background: var(--card); border-radius: 12px; cursor: pointer; }
    .row:hover { background: var(--card-hover); }
    .rtitle { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .pill { font-size: 11px; font-weight: 700; color: var(--ink3); background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 1px 7px; }
    .pcard { background: var(--card); border-radius: 12px; padding: 10px 12px; }
    .ptitle { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .ptext { font-size: 12px; line-height: 1.4; color: var(--ink2); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .prow { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
    .ptag { font-size: 10.5px; font-weight: 600; color: var(--ink3); background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 1px 7px; }
    .copybtn { margin-left: auto; border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 4px 8px; font-size: 11.5px; font-weight: 600; color: var(--ink2); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
    .copybtn:hover { background: var(--card); }
    .empty { text-align: center; color: var(--ink3); font-size: 13px; padding: 40px 20px; line-height: 1.5; }
    .toast { position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%); background: #202126; color: #fff; font-size: 12px; font-weight: 600; padding: 7px 13px; border-radius: 999px; opacity: 0; transition: opacity .18s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <button class="iconbtn" id="back" style="display:none"></button>
    <span id="logo" style="display:flex"></span>
    <span class="wordmark"><span class="gradient-text">savemyprompt</span><span style="color:#37bda9">.ai</span></span>
    <span class="grow"></span>
  </div>
  <div class="searchbar"><span id="sico"></span><input id="search" placeholder="Search prompts…" /></div>
  <div class="crumbs" id="crumbs"></div>
  <div class="content" id="content"></div>
  <div class="toast" id="toast"></div>
  <script src="../lib/icons.js"></script>
  <script src="../lib/store.js"></script>
  <script src="popup.js"></script>
</body>
</html>
