<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body class="collapsed">
  <!-- Collapsed tab (right edge). Hover reveals the vertical wordmark hint. -->
  <div id="tab" class="tab">
    <div class="tab-hint"><span>savemyprompt</span></div>
    <div class="tab-ico" id="tabico"></div>
  </div>

  <!-- Expanded floating card -->
  <div id="panel" class="card-shell panel">
    <div class="header">
      <button class="icon-btn" id="navLeft" title="Close"></button>
      <span class="logo" id="logo"></span>
      <span id="wordmark"></span>
      <span class="spacer"></span>
      <button class="icon-btn" id="viewToggle" title="Toggle view" hidden></button>
    </div>

    <div class="body">
      <div class="searchbar">
        <span id="searchico" class="searchico"></span>
        <input id="search" class="search-input" placeholder="Search prompts…" spellcheck="false" />
      </div>

      <div class="crumbs" id="crumbs"></div>
      <div class="scroll content" id="content"></div>

      <div class="foot">
        <div class="link viewall" id="viewall" hidden>View all</div>
        <div class="dropzone" id="drop">
          <span id="dropico"></span>
          <span class="drop-text">Drop your prompt..</span>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="../shared/icons.js"></script>
  <script src="panel.js"></script>
</body>
</html>
